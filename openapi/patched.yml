    VotingKind:
      enum:
      - ELECTRONIC
      - TRADITIONAL
      - ON_LIST
      type: string
    VotingMajority:
      enum:
      - SIMPLE_MAJORITY
      - STATUTORY_MAJORITY
      - ABSOLUTE_MAJORITY
      - ABSOLUTE_STATUTORY_MAJORITY
      - MAJORITY_TWO_THIRDS
      - STATUTORY_MAJORITY_TWO_THIRDS
      - MAJORITY_THREE_FIFTHS
      - STATUTORY_MAJORITY_THREE_FIFTHS
      type: string
    VotingOption:
      description: voting option when voting on a list
      type: object
      properties:
        optionIndex:
          description: an option index
          type: integer
          example: 1
        option:
          description: an option
          type: string
          example: "STAROŃ LIDIA, INFORMACJA NR 1"
        description:
          description: an optional description
          type: string
          example: w sprawie realizacji rządowego "Programu budowy 100 obwodnic na
            lata 2020-2030"
        votes:
          format: int32
          description: number of votes for this option
          type: integer
          example: 213
    VotingStat:
      description: MP voting statistics
      type: object
      properties:
        sitting:
          format: int32
          description: sitting number
          type: integer
        date:
          format: date
          description: sitting date
          type: string
          example: 2022-03-10
        numVotings:
          format: int32
          description: number of votings on this day
          type: integer
        numVoted:
          format: int32
          description: number of MP votings on this day
          type: integer
        numMissed:
          format: int32
          description: number of votings missed on this day
          type: integer
        absenceExcuse:
          description: is there a excuse for absence
          type: boolean
    WrittenQuestion:
      description: "A written question (pl: zapytanie)."
      type: object
      properties:
        term:
          format: int32
          description: A Sejm term when the document was submitted
          type: integer
          example: 9
        num:
          format: int32
          description: A document number
          type: integer
          example: 14710
        title:
          description: A title of the case
          type: string
          example: Interpelacja w sprawie trudnej sytuacji osób niepełnosprawnych
            z uwagi na kwarantannę nakładaną na ich opiekunów
        receiptDate:
          format: date
          description: A date when the case was received
          type: string
          example: 2020-11-16
        lastModified:
          format: date-time
          description: A date of last modification of a document
          type: string
          example: 2022-09-07T15:01:42
        links:
          description: Links to HTML pages with a description or a content (body)
          type: array
          items: {}
        from:
          description: A list of IDs of MPs who submitted the question
          type: array
          items:
            type: string
          example: 101
        to:
          description: A list of ministries to whom the question was sent
          type: array
          items:
            type: string
          example:
          - minister rodziny i polityki społecznej
          - minister zdrowia
        recipientDetails:
          description: A more detailed list of ministries to whom the question was
            sent
          type: array
          items:
            $ref: '#/components/schemas/CaseRecipientDetails'
        sentDate:
          format: date
          description: A date when the interpellation was sent to recipients
          type: string
          example: 2021-01-20
        replies:
          description: A list of replies
          type: array
          items:
            $ref: '#/components/schemas/Reply'
        answerDelayedDays:
          format: int32
          description: number of days an answer is delayed for a given case. When
            there are multiple recipients then a maximum value is taken.
          type: integer
          example: 300
