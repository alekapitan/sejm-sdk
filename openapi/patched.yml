          format: int32
          type: integer
        example: 123
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: an MP photo
  /sejm/term{term}/MP/{id}/photo-mini:
    get:
      tags:
      - MP
      summary: Returns an MP photo in small size
      parameters:
      - name: id
        in: path
