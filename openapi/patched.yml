---
openapi: 3.0.3
info:
  title: API for Polish Sejm
  version: "1.0"
servers:
- url: https://api.sejm.gov.pl/
- url: http://api.sejm.gov.pl/
tags:
- name: MP
  description: "MPs (pl: posłowie)."
- name: bills
  description: Bills or draft resolutions
- name: clubs
  description: "Clubs in the Sejm (pl: kluby i koła)."
- name: committees
  description: "Committees in the Sejm (pl: komisje sejmowe)."
- name: groups
  description: Bilateral Groups.
- name: interpellations
  description: "Interpellations (pl: interpelacje)."
- name: prints
  description: "Prints issued by the Sejm (pl: druki sejmowe)."
- name: proceedings
  description: "Proceedings of the Sejm (pl: Posiedzenia Sejmu)."
- name: processes
  description: "Information about a legislation process (pl: proces legislacyjny)."
- name: transcripts
  description: Transcripts
- name: videos
  description: "Videos (pl: transmisje wideo)."
- name: votings
  description: Votings.
- name: written questions
  description: "Written questions (pl: zapytania)."
paths:
  /sejm/term:
    get:
      summary: Returns a list of terms
      responses:
        "200":
          description: a list of terms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Term'
  /sejm/term{term}:
    get:
      summary: Returns information about a term
      parameters:
      - name: term
        in: path
        description: a term number
        required: true
        schema:
          format: int32
          type: integer
      responses:
        "200":
          description: information about a term
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Term'
  /sejm/term{term}/MP:
    get:
      tags:
      - MP
      summary: Returns a list of MPs
      parameters:
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: a list of MPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MP'
  /sejm/term{term}/MP/{id}:
    get:
      tags:
      - MP
      summary: Returns an information about an MP
      parameters:
      - name: id
        in: path
        description: an MP ID
        required: true
        schema:
          format: int32
          type: integer
        example: 123
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: an information about an MP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MP'
  /sejm/term{term}/MP/{id}/photo:
