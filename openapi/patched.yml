  /sejm/term{term}/interpellations:
    get:
      tags:
      - interpellations
      summary: Returns a list of interpellations
      parameters:
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      - name: delayed
        in: query
        description: display only cases where an answer delayed
        required: false
        schema:
          type: boolean
      - name: from
        in: query
        description: filters interpellations from a MP with a specified ID
        required: false
        schema:
          type: string
        example: 10
      - name: limit
        in: query
        description: controls the maximum number of items that may be returned for
          a single request
        required: false
        schema:
          format: int32
          default: 50
          minimum: 0
          exclusiveMinimum: true
          type: integer
        example: 50
      - name: modifiedSince
        in: query
        description: filters interpellations modified since specified date
        required: false
        schema:
          $ref: '#/components/schemas/LocalDateTime'
        example: 2022-09-07T14:58:28
      - name: offset
        in: query
        description: controls the starting point within the collection of resource
          results
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
          exclusiveMinimum: true
          type: integer
        example: 150
      - name: since
        in: query
        description: filters interpellations starting from a specified date
        required: false
        schema:
          type: string
        example: 2022-01-15
      - name: sort
        in: query
        description: "sorts objects by specified field, to sort in descending order\
          \ add a minus sign before field name"
        schema:
          type: string
        example: -lastModified
      - name: till
        in: query
        description: filters interpellations starting before a specified date
        required: false
        schema:
          type: string
        example: 2022-01-25
      - name: title
        in: query
        description: filters interpellations containing a specified string in a title
        required: false
        schema:
          type: string
        example: kodeksu pracy
      - name: to
        in: query
        description: filters interpellations sent to a specified recipient
        required: false
        schema:
          type: string
        example: minister finansów
      responses:
        "200":
          description: a list of interpellations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Interpellation'
