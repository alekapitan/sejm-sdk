          type: integer
        example: 123
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: an MP photo in small size
  /sejm/term{term}/MP/{id}/votings/stats:
    get:
      tags:
      - MP
      summary: Returns statistics about votings for an MP
      parameters:
      - name: id
        in: path
        description: an MP ID
        required: true
        schema:
          format: int32
          type: integer
        example: 1
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 10
      responses:
        "200":
          description: an information about votings for an MP
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VotingStat'
  /sejm/term{term}/MP/{id}/votings/{sitting}/{date}:
    get:
      tags:
      - MP
      summary: Returns an information about votings for an MP
      parameters:
      - name: date
        in: path
        description: a date
        required: true
        schema:
          $ref: '#/components/schemas/LocalDate'
        example: 2023-12-13
      - name: id
        in: path
        description: an MP ID
        required: true
        schema:
          format: int32
          type: integer
        example: 1
      - name: sitting
        in: path
        description: a sitting number
        required: true
        schema:
          format: int32
          type: integer
        example: 1
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 10
      responses:
        "200":
          description: an information about votings for an MP
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VoteMP'
  /sejm/term{term}/bilateralGroups:
    get:
      tags:
      - groups
      summary: Returns a list of bilateral groups
      parameters:
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: a list of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
  /sejm/term{term}/bilateralGroups/{id}:
    get:
      tags:
      - groups
      summary: Returns a groups details
      parameters:
      - name: id
        in: path
        description: an ID of the group
        required: true
        schema:
          format: int32
          type: integer
        example: 1
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      responses:
        "200":
          description: a group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetails'
  /sejm/term{term}/bills:
    get:
      tags:
      - bills
      summary: Returns a list of bills
      parameters:
      - name: term
        in: path
        description: a Sejm term
        required: true
        schema:
          format: int32
          type: integer
        example: 9
      - name: consultationResults
        in: query
        description: filter only bills with consultation results
        schema:
          type: boolean
      - name: dateOfReceiptFrom
        in: query
        description: filter bills received after date
        schema:
          $ref: '#/components/schemas/LocalDate'
      - name: dateOfReceiptTo
        in: query
        description: filter bills received before date
        schema:
          $ref: '#/components/schemas/LocalDate'
      - name: euRelated
        in: query
        description: filter bills aimed at implementing European Union law
        schema:
          type: boolean
      - name: limit
        in: query
        description: controls the maximum number of items that may be returned for
          a single request
        required: false
        schema:
          format: int32
          default: 50
          minimum: 0
          exclusiveMinimum: true
          type: integer
        example: 50
      - name: offset
        in: query
        description: controls the starting point within the collection of resource
          results
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
          exclusiveMinimum: true
          type: integer
        example: 150
      - name: publicConsultation
        in: query
        description: filter only bills with public consultation
        schema:
          type: boolean
      - name: sort
        in: query
        description: "sorts objects by specified field, to sort in descending order\
          \ add a minus sign before field name"
        schema:
          type: string
        example: -lastModified
      - name: status
        in: query
        description: filter by status
        schema:
          $ref: '#/components/schemas/BillStatus'
      - name: submissionType
        in: query
        description: filter bills or resolutions
        schema:
          $ref: '#/components/schemas/BillType'
      - name: title
        in: query
        description: filter by part of a title
        schema:
          type: string
        example: podatku
      responses:
        "200":
          description: a list of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bill'
  /sejm/term{term}/clubs:
