components:
  schemas:
    ApplicantType:
      description: Type of applicant
      enum:
      - DEPUTIES
      - COMMITTEE
      - GOVERNMENT
      - PRESIDIUM
      - PRESIDENT
      - SENATE
      - CITIZENS
      type: string
    Attachment:
      description: An attachment.
      type: object
      properties:
        lastModified:
          format: date-time
          description: A date of last modification of a document
          type: string
          example: 2022-09-07T15:01:42
        name:
          description: A name of the file
          type: string
          example: i14710-o3.pdf
        URL:
          description: An url to download a file
          type: string
          example: https://orka2.sejm.gov.pl/INT9.nsf/klucz/ATTBXWKH2/$FILE/i14710-o3.pdf
    Bill:
      description: A bill or a draft resolution submitted to the Sejm
      type: object
      properties:
        term:
          format: int32
          description: Sejm term (parliamentary term)
          type: integer
          example: 10
        number:
          description: Internal Sejm document number
          type: string
          example: RPW/4708/2026
        sendersNumber:
          description: External sender number assigned by KPRM or other authority
          type: string
          example: RM-0610-4-26
        print:
          description: Sejm print number
          type: string
          example: "2206"
        title:
          description: Title of the bill or draft resolution
          type: string
          example: Rządowy projekt ustawy o zmianie ustawy - Prawo lotnicze oraz niektórych
            innych ustaw
        submissionType:
          description: Submission type of the document
          enum:
          - BILL
          - DRAFT_RESOLUTION
          - BILL_AMENDMENT
          - RESOLUTION_AMENDMENT
          type: string
          example: BILL
        dateOfReceipt:
          format: date
          description: Date when the document was received by the Sejm
          type: string
          example: 2026-02-09
        description:
          description: Short description or justification of the document
          type: string
          example: Dotyczy dostosowania krajowego porządku prawnego do unijnych przepisów
            dotyczących zrównoważonego transportu lotniczego ...
        status:
          description: Current procedural status of the document
          enum:
          - ACTIVE
          - WITHDRAWN
          - NOT_PROCEEDED
          - OBSOLETE
          - ADOPTED
          type: string
          example: ACTIVE
        euRelated:
          description: Whether this project aims to implement European Union law
          type: boolean
          example: true
        withdrawnDate:
          format: date
          description: "Date when the document was withdrawn, if applicable"
          type: string
          example: 2025-03-01
          nullable: true
        publicConsultation:
          description: Indicates whether the document was sent to public consultation
          type: boolean
          example: true
        publicConsultationStartDate:
          format: date
          description: Date when public consultation started
          type: string
          example: 2026-02-20
          nullable: true
        publicConsultationEndDate:
          format: date
          description: Date when public consultation ended
          type: string
          example: 2026-03-05
          nullable: true
        consultationResults:
          description: Indicates whether consultation results are available
          type: boolean
          example: false
        applicantType:
          description: Entity that submitted the bill
          enum:
          - DEPUTIES
          - COMMITTEE
          - GOVERNMENT
          - PRESIDIUM
          - PRESIDENT
          - SENATE
          - CITIZENS
          type: string
          example: GOVERNMENT
    BillStatus:
      description: Current procedural status of the document
      enum:
      - ACTIVE
      - WITHDRAWN
      - NOT_PROCEEDED
      - OBSOLETE
      - ADOPTED
      type: string
      example: ACTIVE
    BillType:
      description: Submission type of the document
      enum:
      - BILL
      - DRAFT_RESOLUTION
      - BILL_AMENDMENT
      - RESOLUTION_AMENDMENT
      type: string
      example: BILL
    CaseRecipientDetails:
      description: Details of a correspondence with a recipient
      type: object
      properties:
        name:
          description: name of a recipient
          type: string
          example: prezes Rady Ministrów
        sent:
          format: date
          description: date when a case was sent
          type: string
          example: 2024-01-30
        answerDelayedDays:
          format: int32
          description: number of days an answer is delayed for a given case. When
            an answer was given then the delay is set to 0.
          type: integer
          example: 300
    Club:
      description: A parliamentary club.
      required:
      - id
      type: object
      properties:
        id:
          description: Club identifier.
          type: string
          example: KO
        name:
          description: Name of the club
          type: string
          example: "Klub Parlamentarny Koalicja Obywatelska - Platforma Obywatelska,\
            \ Nowoczesna, Inicjatywa Polska, Zieloni"
        phone:
          description: Phone number to the club
          type: string
          example: (22) 694-25-92
        fax:
          description: Fax number to the club
          type: string
          example: (22) 694-25-92
        email:
          description: Email address to the club
          type: string
          example: kp-ko@kluby.sejm.pl
        membersCount:
          format: int32
          description: Number of club members
          type: integer
